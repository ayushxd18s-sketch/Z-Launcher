name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Z-LAUNCHER-debug-apk
          path: ZalithLauncher/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create permanent release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Z LAUNCHER Build ${{ github.run_number }}
          body: |
            **Z LAUNCHER** — automated build from commit ${{ github.sha }}

            Download the APK below and install on your Android device.

            **Features:**
            - Offline accounts as the default — no Microsoft sign-in needed
            - Custom skin server support (ely.by, authlib-injector)
            - Built-in renderer downloads (Mobile Glues, Zink, GL4ES, etc.)
            - Custom image and video backgrounds

            Built on the Zalith Launcher 2 engine. Licensed under GPL-3.0.
          files: ZalithLauncher/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
